version: 1
services:
  - type: web
    name: pccontrol-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server_bot.py
    repo: ttirex098/pccontrol
    branch: main
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ALLOWED_USER_ID
        sync: false
      - key: AGENT_SECRET
        sync: false
